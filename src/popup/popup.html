<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="popup.css">
<title>X Article Export</title>
</head>
<body>
<div class="wrap">
  <header class="head">
    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M18.9 1.6h3.5l-7.6 8.7 9 11.9h-7l-5.5-7.2-6.3 7.2H1.4l8.2-9.4L1 1.6h7.2l5 6.6 5.7-6.6Zm-1.2 18.4h1.9L6.9 3.6H4.8l12.9 16.4Z"/></svg>
    </div>
    <div class="head-text">
      <h1>Article Export</h1>
      <p class="sub" id="status">Checking this page…</p>
    </div>
  </header>

  <section class="page-card" id="pageCard">
    <span class="badge" id="modeBadge">—</span>
    <p class="page-title" id="pageTitle">—</p>
  </section>

  <section class="options">
    <div class="field">
      <label class="field-label">Style</label>
      <div class="seg" id="theme" role="radiogroup" aria-label="Style">
        <button class="seg-btn is-active" data-value="modern" role="radio" aria-checked="true">Modern</button>
        <button class="seg-btn" data-value="serif" role="radio" aria-checked="false">Serif</button>
      </div>
    </div>

    <div class="field">
      <label class="field-label">Page size</label>
      <div class="seg" id="pageSize" role="radiogroup" aria-label="Page size">
        <button class="seg-btn is-active" data-value="a4" role="radio" aria-checked="true">A4</button>
        <button class="seg-btn" data-value="letter" role="radio" aria-checked="false">Letter</button>
      </div>
    </div>

    <label class="check">
      <input type="checkbox" id="includeSource" checked>
      <span>Include source link</span>
    </label>
  </section>

  <section class="actions">
    <button class="btn btn-primary" id="exportPdf">
      <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M12 3a1 1 0 0 1 1 1v8.6l2.3-2.3a1 1 0 0 1 1.4 1.4l-4 4a1 1 0 0 1-1.4 0l-4-4a1 1 0 1 1 1.4-1.4l2.3 2.3V4a1 1 0 0 1 1-1Zm-7 13a1 1 0 0 1 1 1v2h12v-2a1 1 0 1 1 2 0v3a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1Z"/></svg>
      <span>Save as PDF</span>
    </button>
    <button class="btn btn-ghost" id="exportMd">
      <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path fill="currentColor" d="M3 5h18a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1Zm3 4v6h2v-3l2 2 2-2v3h2V9h-2l-2 2-2-2H6Zm11 0v3h-2l3 3 3-3h-2V9h-2Z"/></svg>
      <span>Markdown</span>
    </button>
  </section>

  <p class="hint" id="hint"></p>

  <footer class="foot">
    <a href="https://github.com/everettjf/x-article-export-pdf" target="_blank" rel="noopener">GitHub</a>
    <span class="dot">·</span>
    <a href="https://everettjf.github.io/x-article-export-pdf/" target="_blank" rel="noopener">Website</a>
  </footer>
</div>
<script src="popup.js"></script>
</body>
</html>
